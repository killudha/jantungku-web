<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart EKG - JantungKuSehat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; border: none; height: 18px; width: 18px;
            border-radius: 50%; background: var(--color-primary); cursor: pointer; margin-top: -6px;
            box-shadow: 0 0 10px rgba(37, 158, 141, 0.5); transition: all 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover { background: var(--color-primary-hover); transform: scale(1.1); }
        input[type=range]::-webkit-slider-track { width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 3px; }

        .hover-tooltip {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body x-data="detailEcgApp()">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <a href="pasien.html" class="text-sm font-bold text-blue-600 hover:text-blue-700 flex items-center gap-2 transition-all">
                ⬅️ Kembali ke Daftar Master
            </a>
            <div class="text-[10px] font-mono text-slate-400 p-2 bg-white rounded-lg shadow-sm flex gap-3">
                <span>USER_ID: <span class="font-bold text-slate-700" x-text="userId"></span></span>
                <span>REF_ID: <span class="font-bold text-slate-700" x-text="recordId"></span></span>
            </div>
        </div>

        <template x-if="loading">
            <div class="card text-center py-16 text-slate-400 font-bold italic shadow-lg border">
                <span class="block text-4xl mb-4">🩺</span>
                Mengekstraksi & merekonstruksi sinyal EKG pasien dari Firebase...
            </div>
        </template>

        <template x-if="!loading">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                
                <div class="card lg:col-span-1 flex flex-col justify-between shadow-sm border border-slate-100">
                    <div>
                        <div class="flex items-center gap-3 mb-5 border-b pb-4">
                            <span class="text-3xl">📝</span>
                            <div>
                                <h2 class="text-xl font-black text-slate-950">Berkas Klinis</h2>
                                <p class="text-xs text-slate-400 font-medium">Lengkapi kualifikasi proposal medis.</p>
                            </div>
                        </div>
                        
                        <form @submit.prevent="updateKlinisPasien">
                            <div class="mb-4">
                                <label class="block text-[10px] uppercase font-black text-slate-400 mb-1">Nama Lengkap Pasien</label>
                                <input type="text" x-model="form.nama" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl font-bold text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all">
                            </div>
                            <div class="mb-4">
                                <label class="block text-[10px] uppercase font-black text-slate-400 mb-1">Jenis Kelamin</label>
                                <select x-model="form.jk" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl font-bold text-slate-800 focus:outline-none focus:border-blue-500 transition-all cursor-pointer">
                                    <option value="Laki-laki">Laki-laki</option>
                                    <option value="Perempuan">Perempuan</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="block text-[10px] uppercase font-black text-slate-400 mb-1">Umur (Tahun)</label>
                                <input type="number" x-model.number="form.umur" required min="1" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl font-bold text-slate-800 focus:outline-none focus:border-blue-500 transition-all">
                            </div>
                            <div class="mb-4">
                                <label class="block text-[10px] uppercase font-black text-slate-400 mb-1">Tinggi Badan (cm)</label>
                                <input type="number" x-model.number="form.tb" required min="1" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl font-bold text-slate-800 focus:outline-none focus:border-blue-500 transition-all">
                            </div>
                            <div class="mb-6">
                                <label class="block text-[10px] uppercase font-black text-slate-400 mb-1">Berat Badan (Kg)</label>
                                <input type="number" x-model.number="form.bb" required min="1" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl font-bold text-slate-800 focus:outline-none focus:border-blue-500 transition-all">
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl text-xs tracking-wider transition-all shadow-md mb-3">
                                💾 SIMPAN PERUBAHAN KLINIS
                            </button>
                        </form>
                    </div>
                    <button @click="deleteRecordMedis" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-black py-3 rounded-xl text-xs tracking-wider transition-all border border-red-100 mt-4">
                        🗑 HAPUS PERMANEN ARSIP INI
                    </button>
                </div>

                <div class="lg:col-span-3 flex flex-col gap-6">
                    
                    <div class="card flex justify-between items-center shadow-lg border-l-8 transition-colors duration-300"
                         :class="{
                             'border-blue-600': rawData.result === 'NORMAL',
                             'border-red-600 bg-red-50/50': rawData.result === 'ARITMIA',
                             'border-yellow-500 bg-yellow-50/50': ['TAKIKARDIA', 'BRADIKARDIA'].includes(rawData.result)
                         }">
                        <div>
                            <span class="text-[10px] uppercase tracking-widest font-black text-slate-400">Diagnosis Sistem (Hybrid)</span>
                            <h2 class="text-5xl font-black italic mt-1 text-slate-950 tracking-tighter" x-text="rawData.result"></h2>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1">
                            <span class="text-xs font-mono font-medium p-1.5 bg-slate-100 rounded text-slate-500" x-text="formatDate(rawData.timestamp)"></span>
                            <span class="text-sm font-bold text-slate-800 mt-1" x-text="'Rata-Rata: ' + rawData.avg_bpm + ' BPM'"></span>
                            <span class="text-xs text-slate-400" x-text="'Durasi Total: ' + rawData.duration_minutes + ' Menit'"></span>
                        </div>
                    </div>

                    <div class="card shadow-md border border-slate-100">
                        <div class="flex justify-between items-center mb-4 border-b pb-4">
                            <h3 class="font-black text-sm tracking-wider text-slate-400 uppercase flex items-center gap-2">🩺 EKG Viewer Intraktif</h3>
                        </div>

                        <div class="relative w-full rounded-2xl overflow-hidden" 
                             @mousemove="trackMouse($event)" 
                             @mouseleave="isHovering = false">
                            
                            <canvas id="ecgDetailCanvasInteractive" class="ecg-canvas"></canvas>

                            <div x-show="isHovering" 
                                 class="absolute top-0 bottom-0 w-px bg-rose-500/50 pointer-events-none" 
                                 :style="`left: ${hoverX}px;`"></div>
                            
                            <div x-show="isHovering" 
                                 class="absolute w-3 h-3 bg-rose-500 border-2 border-white rounded-full pointer-events-none transform -translate-x-1/2 -translate-y-1/2 shadow-[0_0_10px_rgba(244,63,94,0.8)]" 
                                 :style="`left: ${hoverX}px; top: ${hoverY}px;`"></div>
                            
                            <div x-show="isHovering" 
                                 class="absolute z-10 hover-tooltip text-white rounded-xl px-4 py-2 pointer-events-none transform -translate-x-1/2 -translate-y-[120%]" 
                                 :style="`left: ${hoverX}px; top: ${hoverY}px;`">
                                <div class="text-[10px] uppercase font-black tracking-widest text-slate-400 mb-1 border-b border-white/10 pb-1">Detail Titik</div>
                                <div class="font-mono text-sm font-bold text-rose-400 flex items-center gap-2">
                                    ⏱️ <span x-text="hoverTime"></span>
                                </div>
                                <div class="font-mono text-sm font-bold text-emerald-400 flex items-center gap-2 mt-0.5">
                                    ⚡ <span x-text="hoverValue"></span> <span class="text-[10px] text-slate-400">Val</span>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5 p-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-6">
                            
                            <div class="flex items-center gap-2 border-r pr-6">
                                <label class="text-[10px] uppercase font-black text-slate-400 mr-2">Zoom</label>
                                <button @click="changeZoom('in')" :disabled="currentZoomIndex === 0" 
                                        class="p-2.5 bg-white hover:bg-slate-100 disabled:opacity-40 border rounded-xl shadow-sm text-sm transition-all">➕</button>
                                <button @click="changeZoom('out')" :disabled="currentZoomIndex === zoomLevels.length - 1" 
                                        class="p-2.5 bg-white hover:bg-slate-100 disabled:opacity-40 border rounded-xl shadow-sm text-sm transition-all">➖</button>
                            </div>

                            <div class="flex-grow flex items-center gap-3">
                                <label class="text-[10px] uppercase font-black text-slate-400 mr-2">Timeline</label>
                                
                                <button @click="moveWindow(-1)" :disabled="windowStart === 0" 
                                        class="px-3 py-1.5 bg-white hover:bg-blue-50 text-blue-600 disabled:text-slate-400 disabled:bg-slate-100 disabled:opacity-50 border rounded-lg shadow-sm text-sm font-black transition-all flex-shrink-0"
                                        title="Geser ke Sebelumnya">◀</button>

                                <div class="text-xs font-mono font-bold text-blue-600 w-12 text-right" x-text="formatTime(windowStart, true)"></div>
                                
                                <input type="range" min="0" :max="Math.max(0, totalPoints - windowSize)" x-model.number="windowStart" @input="drawInteractiveGraph()"
                                       class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                                
                                <div class="text-xs font-mono font-bold text-slate-400 w-12" x-text="formatTime(totalPoints, true)"></div>

                                <button @click="moveWindow(1)" :disabled="windowStart + windowSize >= totalPoints" 
                                        class="px-3 py-1.5 bg-white hover:bg-blue-50 text-blue-600 disabled:text-slate-400 disabled:bg-slate-100 disabled:opacity-50 border rounded-lg shadow-sm text-sm font-black transition-all flex-shrink-0"
                                        title="Geser ke Selanjutnya">▶</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
        function detailEcgApp() {
            return {
                userId: '', recordId: '', loading: true, rawData: {}, graphArray: [], totalPoints: 0,
                ecgBg: '#00091d', ecgLine: '#00ffbf',
                windowStart: 0, windowSize: 1000, 
                zoomLevels: [375, 750, 1000, 2000, 4000, 7500], currentZoomIndex: 2,
                form: { nama: '', jk: 'Laki-laki', umur: '', tb: '', bb: '' },

                isHovering: false, hoverX: 0, hoverY: 0, hoverTime: '', hoverValue: 0,

                init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    this.recordId = urlParams.get('id');
                    this.userId = urlParams.get('userId');
                    
                    // Validasi: Wajib ada Record ID & User ID
                    if (!this.recordId || !this.userId) { window.location.href = 'pasien.html'; return; }
                    
                    this.windowSize = this.zoomLevels[this.currentZoomIndex]; 
                    this.initFirebaseAndFetchData();

                    try {
                        const root = getComputedStyle(document.documentElement);
                        const bg = root.getPropertyValue('--color-ecg-bg').trim();
                        const line = root.getPropertyValue('--color-ecg-line').trim();
                        if (bg) this.ecgBg = bg;
                        if (line) this.ecgLine = line;
                    } catch (e) {}
                },

                formatDate(dateString) {
                    if (!dateString) return '-';
                    const date = new Date(dateString);
                    if (isNaN(date.getTime())) return dateString; 
                    return date.toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' WIB';
                },

                initFirebaseAndFetchData() {
                    const config = {
                        apiKey: "AIzaSyD7cegeyQVu5d0cRkv1dyAjzXWOz8gE-HM",
                        authDomain: "smart-ekg-tmj-6b.firebaseapp.com",
                        databaseURL: "https://smart-ekg-tmj-6b-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "smart-ekg-tmj-6b"
                    };
                    if (!firebase.apps.length) firebase.initializeApp(config);

                    // Arahkan ke history_records -> userId -> recordId
                    firebase.database().ref(`history_records/${this.userId}/${this.recordId}`).once('value').then((snapshot) => {
                        const val = snapshot.val();
                        if (!val) { window.location.href = 'pasien.html'; return; }
                        
                        // Ekstrak string data grafik yang dipisah koma (jika ada)
                        if (val.ecgDataString && typeof val.ecgDataString === 'string') {
                            this.graphArray = val.ecgDataString.split(',').map(Number);
                        } else if (val.graph_value) {
                            if (Array.isArray(val.graph_value)) { this.graphArray = val.graph_value; } 
                            else { this.graphArray = Object.values(val.graph_value); }
                        } else {
                            this.graphArray = [];
                        }
                        
                        this.totalPoints = this.graphArray.length;
                        
                        // Hitung durasi (125 FPS / Hz)
                        const totalSeconds = this.totalPoints / 125;
                        const durationMins = (totalSeconds / 60).toFixed(2);

                        // Mapping data Firebase ke model HTML
                        this.rawData = {
                            result: val.statusML ? val.statusML.toUpperCase() : 'UNKNOWN',
                            avg_bpm: val.bpm || 0,
                            timestamp: val.timestamp || '-',
                            duration_minutes: durationMins
                        };
                        
                        // Setel form klinis berdasarkan format data baru ('username', dsb)
                        this.form.nama = val.username || ''; 
                        this.form.jk = val.jk || 'Laki-laki';
                        this.form.umur = val.umur || ''; 
                        this.form.tb = val.tb || ''; 
                        this.form.bb = val.bb || '';

                        this.loading = false;
                        this.$nextTick(() => { this.drawInteractiveGraph(); });
                    });
                },

                formatTime(pointIndex, simpleFormat = false) {
                    if (pointIndex < 0) pointIndex = 0;
                    const totalSeconds = pointIndex / 125;
                    const mins = Math.floor(totalSeconds / 60);
                    const secs = Math.floor(totalSeconds % 60);
                    const dec = Math.floor((totalSeconds % 1) * 100); 
                    
                    const formatMins = String(mins).padStart(2, '0');
                    const formatSecs = String(secs).padStart(2, '0');
                    
                    if (simpleFormat) return `${formatMins}:${formatSecs}`;
                    return `${formatMins}:${formatSecs}.${String(dec).padStart(2, '0')}`;
                },

                drawInteractiveGraph() {
                    const canvas = document.getElementById('ecgDetailCanvasInteractive');
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d', { alpha: false });
                    
                    canvas.width = canvas.clientWidth; canvas.height = 350;
                    ctx.fillStyle = this.ecgBg; ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.strokeStyle = 'rgba(0, 255, 180, 0.03)'; ctx.lineWidth = 1;
                    for (let x = 0; x < canvas.width; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
                    for (let y = 0; y < canvas.height; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
                    
                    ctx.strokeStyle = 'rgba(0, 255, 180, 0.15)'; ctx.lineWidth = 1.5;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.font = '10px "JetBrains Mono", monospace';
                    ctx.textAlign = 'center';
                    
                    for (let x = 0; x <= canvas.width; x += 100) { 
                        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); 
                        const pointAtX = this.windowStart + (x / canvas.width) * (this.windowSize - 1);
                        const timeString = this.formatTime(pointAtX, true); 
                        ctx.fillText(timeString, x, canvas.height - 8);
                    }

                    for (let y = 0; y < canvas.height; y += 100) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

                    const end = Math.min(this.windowStart + this.windowSize, this.totalPoints);
                    const slicedData = this.graphArray.slice(this.windowStart, end);

                    if (slicedData.length === 0) return;

                    ctx.strokeStyle = this.ecgLine; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                    ctx.beginPath();

                    const stepX = canvas.width / (this.windowSize - 1);
                    const minClamp = 400; const maxClamp = 1100;

                    slicedData.forEach((point, i) => {
                        let val = parseFloat(point);
                        if (val < minClamp) val = minClamp; if (val > maxClamp) val = maxClamp;

                        const normalized = (val - minClamp) / (maxClamp - minClamp);
                        const x = i * stepX;
                        const y = (canvas.height - 25) - (normalized * (canvas.height - 40)) + 10; 

                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    });
                    ctx.stroke();
                },

                trackMouse(event) {
                    const canvas = event.currentTarget;
                    const rect = canvas.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    if (x < 0 || x > rect.width) return;

                    const percent = x / rect.width;
                    const end = Math.min(this.windowStart + this.windowSize, this.totalPoints);
                    const actualWindowSize = end - this.windowStart;
                    const pointIndexOffset = Math.floor(percent * (actualWindowSize - 1));
                    const absoluteIndex = this.windowStart + pointIndexOffset;

                    if (absoluteIndex >= 0 && absoluteIndex < this.totalPoints) {
                        this.isHovering = true;
                        this.hoverX = x;
                        
                        this.hoverValue = parseFloat(this.graphArray[absoluteIndex]).toFixed(1);
                        this.hoverTime = this.formatTime(absoluteIndex, false); 

                        const canvasHeight = 350;
                        const minClamp = 400; 
                        const maxClamp = 1100;
                        let val = parseFloat(this.hoverValue);
                        if (val < minClamp) val = minClamp; 
                        if (val > maxClamp) val = maxClamp;
                        
                        const normalized = (val - minClamp) / (maxClamp - minClamp);
                        this.hoverY = (canvasHeight - 25) - (normalized * (canvasHeight - 40)) + 10;
                    }
                },

                moveWindow(direction) {
                    let nextStart = this.windowStart + (direction * this.windowSize);
                    if (nextStart < 0) { nextStart = 0; } 
                    else if (nextStart > this.totalPoints - this.windowSize) { nextStart = Math.max(0, this.totalPoints - this.windowSize); }
                    this.windowStart = nextStart;
                    this.drawInteractiveGraph();
                    this.isHovering = false; 
                },

                changeZoom(direction) {
                    if (direction === 'in' && this.currentZoomIndex > 0) this.currentZoomIndex--;
                    else if (direction === 'out' && this.currentZoomIndex < this.zoomLevels.length - 1) this.currentZoomIndex++;
                    else return; 
                    this.windowSize = this.zoomLevels[this.currentZoomIndex];
                    if (this.windowStart + this.windowSize > this.totalPoints) {
                        this.windowStart = Math.max(0, this.totalPoints - this.windowSize);
                    }
                    this.drawInteractiveGraph();
                    this.isHovering = false; 
                },

                updateKlinisPasien() {
                    const updatePayload = {
                        username: this.form.nama,
                        jk: this.form.jk,
                        umur: this.form.umur,
                        tb: this.form.tb,
                        bb: this.form.bb
                    };

                    firebase.database().ref(`history_records/${this.userId}/${this.recordId}`).update(updatePayload)
                        .then(() => { alert('✅ Sukses! Kualifikasi dokumen klinis pasien berhasil diperbarui.'); })
                        .catch(err => alert('❌ Gagal memperbarui: ' + err.message));
                },

                deleteRecordMedis() {
                    if (confirm('Hapus seluruh arsip rekam medis pasien ini secara permanen dari Firebase?')) {
                        firebase.database().ref(`history_records/${this.userId}/${this.recordId}`).remove()
                            .then(() => {
                                alert('🗑️ Sukses! Seluruh dokumen riwayat rekam medis berhasil dihapus.');
                                window.location.href = 'pasien.html';
                            })
                            .catch(err => alert('❌ Gagal menghapus: ' + err.message));
                    }
                }
            }
        }
    </script>
</body>
</html>
